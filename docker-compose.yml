version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: grandpneus_db
    environment:
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: user_management_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    container_name: grandpneus_backend
    ports:
      - "5062:8080"
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Server=db;Database=user_management_db;User=root;Password=;
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    container_name: grandpneus_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mysql_data: